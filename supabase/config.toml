# Local-only configuration for the shared TSY.Microglow backend.
# Remote project linking is intentionally not stored here.
project_id = "microglow-platform"

[api]
enabled = true
port = 55221
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
auto_expose_new_tables = false

[db]
port = 55222
shadow_port = 55220
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 55229
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 55223
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 55224

[storage]
enabled = true
file_size_limit = "5MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "2MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[storage.buckets.radar-product-images]
public = true
file_size_limit = "3MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[auth]
enabled = true
site_url = "https://tsy3991.github.io/TSY.Microglow-Website/"
additional_redirect_urls = [
  "https://tsy3991.github.io/TSY.Microglow-Website/auth/callback.html",
  "https://tsy3991.github.io/TSY.Microglow-Games/auth/callback.html",
  "http://127.0.0.1:8849/auth/callback.html",
  "http://localhost:8849/auth/callback.html",
  "http://127.0.0.1:8848/auth/callback.html",
  "http://localhost:8848/auth/callback.html",
  "http://127.0.0.1:5180/auth/callback",
  "http://localhost:5180/auth/callback",
  "https://127.0.0.1:5180/auth/callback",
  "https://localhost:5180/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = false
port = 55227
backend = "postgres"
