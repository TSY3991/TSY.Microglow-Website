<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0f766e">
    <title>找不到頁面｜TSY 微光創作室</title>
    <link rel="icon" href="/TSY.Microglow-Website/assets/logo-mark.png" type="image/png">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: #f8f4ec;
        color: #202a28;
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        text-align: center;
      }
      .panel {
        max-width: 460px;
        padding: 40px 32px;
        border: 1px solid rgba(32, 42, 40, 0.1);
        border-radius: 22px;
        background: rgba(255, 253, 248, 0.9);
        box-shadow: 0 18px 40px rgba(42, 47, 45, 0.08);
      }
      .code {
        margin-bottom: 8px;
        color: #0e8f88;
        font-size: 4rem;
        font-weight: 950;
        line-height: 1;
      }
      h1 {
        margin-bottom: 12px;
        font-size: 1.4rem;
        font-weight: 900;
      }
      p {
        margin-bottom: 24px;
        color: #5c6664;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.6;
      }
      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 26px;
        border-radius: 999px;
        background: linear-gradient(135deg, #07635e, #0e8f88);
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 900;
        text-decoration: none;
        box-shadow: 0 10px 22px rgba(14, 143, 136, 0.3);
      }
      .home-link:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="code" aria-hidden="true">404</div>
      <h1>找不到這個頁面</h1>
      <p>網址可能打錯了，或這個頁面已經搬家。<br>回到入口網站就能找到所有工具與遊戲。</p>
      <a class="home-link" href="/TSY.Microglow-Website/">回到入口網站</a>
    </main>
  </body>
</html>
